kind = "web"
previewPath = "/"
title = "Build Your First Gadget — Audiobook"
version = "1.0.0"
id = "artifacts/audiobook"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21251

[services.development]
run = "pnpm --filter @workspace/audiobook run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/audiobook", "run", "build" ]
publicDir = "artifacts/audiobook/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21251"
BASE_PATH = "/"
